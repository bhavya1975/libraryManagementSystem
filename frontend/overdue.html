<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Overdue - Library System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<nav id="sidebar"></nav>

  <main>
    <h2 class="header-title">Overdue Logs</h2>
    <div class="card table-container">
      <table>
        <thead>
          <tr>
            <th>Issue ID</th>
            <th>Member</th>
            <th>Book Title</th>
            <th>Issue Date</th>
            <th>Due Date</th>
            <th>Minutes Overdue</th>
            <th>Current Fine</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
  <script src="script.js"></script>
  <script>
    async function load() {
      try {
        const res = await fetch('/api/overdue');
        const data = await res.json();
        const tbody = document.getElementById('tbody');
        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7">No overdue books right now!</td></tr>';
          return;
        }
        tbody.innerHTML = data.map(r => `
          <tr>
            <td>${r.issue_id}</td>
            <td>${r.member_name} (#${r.member_id})</td>
            <td>${r.title}</td>
            <td>${r.issue_date ? r.issue_date.substring(0, 10) : ''}</td>
            <td>${r.due_date ? r.due_date.substring(0, 10) : ''}</td>
            <td style="color: var(--danger); font-weight: bold;">${r.minutes_overdue} min</td>
            <td style="color: var(--danger); font-weight: bold;">₹${r.fine_amount}</td>
          </tr>
        `).join('');
      } catch (e) {
        document.getElementById('tbody').innerHTML = '<tr><td colspan="7">Error loading overdue books</td></tr>';
      }
    }
    load();
  </script>
</body>
</html>
