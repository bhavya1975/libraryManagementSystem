<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Overdue Books - Library System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="sidebar"></nav>
  <main>
    <h2 class="header-title">My Overdue Books & Fines</h2>
    <div class="card">
      <table id="issued-books">
        <thead>
          <tr>
            <th>Book Title</th>
            <th>Issue Date</th>
            <th>Due Date</th>
            <th>Fine</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="5">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
  <script src="script.js"></script>
  <script>
    async function loadMyOverdue() {
      const userId = localStorage.getItem('userId');
      if (!userId) return;
      
      const res = await fetch(`/api/members/${userId}/issued`);
      const books = await res.json();
      
      const overdueBooks = books.filter(b => !b.return_date && new Date(b.due_date) < new Date());
      
      const tbody = document.querySelector('#issued-books tbody');
      if (overdueBooks.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5">You have no overdue books! Great job!</td></tr>';
        return;
      }

      tbody.innerHTML = overdueBooks.map(b => {
        let fineMsg = `$${b.fine_amount.toFixed(2)}`;
        if (b.fine_amount === 0) { fineMsg = 'Calculate at desk'; }

        return `
          <tr>
            <td>${b.title} (Copy #${b.copy_id})</td>
            <td>${new Date(b.issue_date).toLocaleDateString()}</td>
            <td><strong style="color: red">${new Date(b.due_date).toLocaleDateString()}</strong></td>
            <td>${fineMsg} (${b.paid_status || 'N/A'})</td>
            <td><span style="color: red">Overdue</span></td>
          </tr>
        `;
      }).join('');
    }
    loadMyOverdue();
  </script>
</body>
</html>
