<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Book - Library System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<nav id="sidebar"></nav>

  <main>
    <h2 class="header-title">Add New Book</h2>
    <div class="card">
      <form id="form" onsubmit="submitForm(event)">
        <div class="form-group">
          <label>Book Title (Type to search existing books)</label>
          <input type="text" id="title" list="book-list" required placeholder="The Great Gatsby" autocomplete="off" oninput="handleBookSelect()">
          <datalist id="book-list"></datalist>
          <small id="book-hint" style="color: #4CAF50; display: none; margin-top: 5px;">Existing book selected. Submitting will add new copies.</small>
        </div>
        <div class="form-group">
          <label>ISBN</label>
          <input type="text" id="isbn" required placeholder="978-3-16-148410-0" pattern="^[\d\-]{10,17}$" title="ISBN must be 10 or 13 digits, optionally with hyphens">
        </div>
        <div class="form-group">
          <label>Publisher</label>
          <input type="text" id="publisher" placeholder="Scribner" maxlength="150">
        </div>
        <div class="form-group">
          <label>Publication Year</label>
          <input type="number" id="year" placeholder="1925" min="1500" max="2100">
        </div>
        <div class="form-group">
          <label>Category (Type or select)</label>
          <input type="text" id="category" list="category-list" required placeholder="Type category name" autocomplete="off">
          <datalist id="category-list"></datalist>
        </div>
        <div class="form-group">
          <label>Author Name(s)</label>
          <input
            type="text"
            id="author_names"
            required
            placeholder="e.g. J. K. Rowling, George Orwell"
          >
        </div>
        <div class="form-group">
          <label>Number of Copies to Add</label>
          <input type="number" id="copies" value="1" min="1" required>
        </div>
        <button type="submit" class="btn" id="submit-btn">Save Book & Copies</button>
      </form>
      <div id="status" class="status"></div>
    </div>
  </main>
  <script src="script.js"></script>
  <script>
    let allBooks = [];
    let allCats = [];
    let selectedExistingBookId = null;

    async function load() {
      const [bRes, cRes] = await Promise.all([
        fetch('/api/books'),
        fetch('/api/categories')
      ]);
      allBooks = await bRes.json();
      allCats = await cRes.json();

      document.getElementById('book-list').innerHTML = allBooks.map(b => `<option value="${b.title.trim()}"></option>`).join('');
      document.getElementById('category-list').innerHTML = allCats.map(c => `<option value="${c.category_name.trim()}"></option>`).join('');
    }
    load();

    function handleBookSelect() {
      const titleStr = document.getElementById('title').value.trim();
      const book = allBooks.find(b => b.title.trim().toLowerCase() === titleStr.toLowerCase());
      
      const isbnEl = document.getElementById('isbn');
      const pubEl = document.getElementById('publisher');
      const yearEl = document.getElementById('year');
      const catEl = document.getElementById('category');
      const authEl = document.getElementById('author_names');
      const hintEl = document.getElementById('book-hint');
      const btnEl = document.getElementById('submit-btn');

      if (book) {
        selectedExistingBookId = book.book_id;
        isbnEl.value = book.isbn;
        isbnEl.readOnly = true;
        pubEl.value = book.publisher || '';
        pubEl.readOnly = true;
        yearEl.value = book.publication_year || '';
        yearEl.readOnly = true;
        catEl.value = book.category_name ? book.category_name.trim() : '';
        catEl.readOnly = true;
        authEl.value = book.authors ? book.authors.trim() : '';
        authEl.readOnly = true;
        hintEl.style.display = 'block';
        btnEl.innerText = 'Add Copies to Existing Book';
      } else {
        selectedExistingBookId = null;
        if (isbnEl.readOnly) {
          isbnEl.value = '';
          pubEl.value = '';
          yearEl.value = '';
          catEl.value = '';
          authEl.value = '';
        }
        isbnEl.readOnly = false;
        pubEl.readOnly = false;
        yearEl.readOnly = false;
        catEl.readOnly = false;
        authEl.readOnly = false;
        hintEl.style.display = 'none';
        btnEl.innerText = 'Save Book & Copies';
      }
    }

    async function submitForm(e) {
      e.preventDefault();
      const copies = Number(document.getElementById('copies').value);
      
      // If book already exists, just add copies
      if (selectedExistingBookId) {
        try {
          const res = await fetch(`/api/books/${selectedExistingBookId}/copies`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ number_of_copies: copies })
          });
          if (res.ok) {
            showStatus('status', 'Additional copies added to existing book!', true);
            document.getElementById('form').reset();
            handleBookSelect();
            load();
          } else {
            showStatus('status', 'Error adding copies.', false);
          }
        } catch(err) { showStatus('status', 'Network Error', false); }
        return;
      }
      
      // Creating a completely new book
      let catName = document.getElementById('category').value.trim();
      
      // Find or create category
      let catId = null;
      let existingCat = allCats.find(c => c.category_name.trim().toLowerCase() === catName.toLowerCase());
      if (existingCat) { catId = existingCat.category_id; }
      else {
        try {
          const r = await fetch('/api/categories', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({category_name: catName})});
          if (!r.ok) throw new Error();
          const d = await r.json();
          catId = d.category_id;
        } catch(e) {
          showStatus('status', 'Failed to create new category.', false);
          return;
        }
      }
      
      const payload = {
        title: document.getElementById('title').value.trim(),
        isbn: document.getElementById('isbn').value.trim(),
        publisher: document.getElementById('publisher').value.trim(),
        publication_year: document.getElementById('year').value ? Number(document.getElementById('year').value) : null,
        category_id: catId,
        author_names: document
          .getElementById('author_names')
          .value
          .split(',')
          .map(name => name.trim())
          .filter(Boolean),
        number_of_copies: copies
      };

      try {
        const res = await fetch('/api/books', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
        });
        if (res.ok) {
          showStatus('status', 'New Book and Copies securely saved!', true);
          document.getElementById('form').reset();
          handleBookSelect();
          load();
        } else {
          showStatus('status', 'Error saving book. Is ISBN unique?', false);
        }
      } catch (err) {
        showStatus('status', 'Network Error', false);
      }
    }
  </script>
</body>
</html>
