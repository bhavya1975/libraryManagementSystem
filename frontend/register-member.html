<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register Member - Library System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<nav>
  <h1>Library DBMS</h1>
  <a href="index.html" class="">Dashboard</a>
  <a href="add-book.html" class="">Add Book</a>
  <a href="register-member.html" class="active">Register Member</a>
  <a href="issue-book.html" class="">Issue Book</a>
  <a href="return-book.html" class="">Return Book</a>
  <a href="search-book.html" class="">Search Book</a>
  <a href="overdue.html" class="">View Overdue</a>
</nav>

  <main>
    <h2 class="header-title">Register Member</h2>
    <div class="card">
      <form id="form" onsubmit="submitForm(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" required placeholder="Alice Johnson">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="alice@example.com">
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="phone" placeholder="+1 234 567 8900">
        </div>
        <button type="submit" class="btn">Register Member</button>
      </form>
      <div id="status" class="status"></div>
    </div>
  </main>
  <script src="script.js"></script>
  <script>
    async function submitForm(e) {
      e.preventDefault();
      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value
      };
      try {
        const res = await fetch('/api/members', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
        });
        if (res.ok) {
          showStatus('status', 'Member successfully registered!', true);
          document.getElementById('form').reset();
        } else {
          const d = await res.json();
          showStatus('status', d.message || 'Error occurred', false);
        }
      } catch (err) {
        showStatus('status', 'Network Error', false);
      }
    }
  </script>
</body>
</html>
