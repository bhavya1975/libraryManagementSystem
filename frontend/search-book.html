<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Books - Library System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<nav id="sidebar"></nav>

  <main>
    <h2 class="header-title">Search Directory</h2>
    <div class="card">
      <form id="form" onsubmit="submitForm(event)">
        <div class="dashboard-grid" style="gap: 1rem; margin-bottom: 0;">
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="title" placeholder="Search by title...">
          </div>
          <div class="form-group">
            <label>Author</label>
            <input type="text" id="author" placeholder="Search by author...">
          </div>
          <div class="form-group">
            <label>Category</label>
            <input type="text" id="category" placeholder="Search by category...">
          </div>
        </div>
        <button type="submit" class="btn" style="width: auto;">Search Database</button>
      </form>
    </div>
    
    <div class="table-container card" style="margin-top: 2rem;">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>ISBN</th>
            <th>Category</th>
            <th>Author(s)</th>
            <th>Year</th>
            <th id="actions-head" style="display: none;">Admin Actions</th>
          </tr>
        </thead>
        <tbody id="tbody">
        </tbody>
      </table>
    </div>
  </main>
  <script src="script.js"></script>
  <script>
    const isAdmin = localStorage.getItem('role') === 'admin';
    if (isAdmin) { document.getElementById('actions-head').style.display = 'table-cell'; }

    async function submitForm(e) {
      if(e) e.preventDefault();
      const t = document.getElementById('title').value;
      const a = document.getElementById('author').value;
      const c = document.getElementById('category').value;
      
      const params = new URLSearchParams();
      if (t) params.append('title', t);
      if (a) params.append('author', a);
      if (c) params.append('category', c);
      
      const res = await fetch(`/api/books?${params.toString()}`);
      const data = await res.json();
      
      document.getElementById('tbody').innerHTML = data.map(b => {
        let actionsHtml = '';
        if (isAdmin) {
          actionsHtml = `
            <td>
              <button onclick="editBook(${b.book_id}, '${b.title.replace(/'/g, "\\'")}', '${b.isbn}', '${b.publisher || ''}', '${b.publication_year || ''}')" style="background:#ff9800; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">Edit</button>
              <button onclick="deleteBook(${b.book_id})" style="background:#f44336; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">Delete</button>
            </td>
          `;
        }
        return `
          <tr>
            <td>${b.book_id}</td>
            <td>${b.title}</td>
            <td>${b.isbn}</td>
            <td>${b.category_name || ''}</td>
            <td>${b.authors || ''}</td>
            <td>${b.publication_year || ''}</td>
            ${actionsHtml}
          </tr>
        `;
      }).join('');
    }

    async function editBook(id, t, i, p, y) {
      const newTitle = prompt('Edit Title:', t);
      if (newTitle === null) return;
      const newIsbn = prompt('Edit ISBN:', i);
      const newPub = prompt('Edit Publisher:', p);
      const newYear = prompt('Edit Publication Year (optional):', y);

      const payload = {
        title: newTitle.trim() || t,
        isbn: newIsbn.trim() || i,
        publisher: newPub ? newPub.trim() : null,
        publication_year: newYear ? Number(newYear) : null
      };

      try {
        const res = await fetch(`/api/books/${id}`, {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        if (res.ok) alert('Book updated!');
        else alert('Failed to update. Check logic or ISBN constraints.');
        submitForm();
      } catch (err) { alert('Network error'); }
    }

    async function deleteBook(id) {
      if (!confirm('Are you absolutely sure? This will delete the book, authors link, and ALL physical copies!')) return;
      try {
        const res = await fetch(`/api/books/${id}`, { method: 'DELETE' });
        if (res.ok) alert('Book and its copies permanently deleted.');
        else alert('Failed to delete book.');
        submitForm();
      } catch(err) { alert('Network error'); }
    }

    submitForm(); // initial load
  </script>
</body>
</html>
