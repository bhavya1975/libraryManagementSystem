<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Issued Books - Library System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="sidebar"></nav>
  <main>
    <h2 class="header-title">My Issued Books</h2>
    <div class="card">
      <table id="issued-books">
        <thead>
          <tr>
            <th>Book Title</th>
            <th>Issue Date</th>
            <th>Due Date</th>
            <th>Return Date</th>
            <th>Fine</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="6">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
  <script src="script.js"></script>
  <script>
    async function loadMyBooks() {
      const userId = localStorage.getItem('userId');
      if (!userId) return;
      const res = await fetch(`/api/members/${userId}/issued`);
      const books = await res.json();
      
      const tbody = document.querySelector('#issued-books tbody');
      if (books.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6">You have no issued books.</td></tr>';
        return;
      }

      tbody.innerHTML = books.map(b => {
        let status = b.return_date ? '<span style="color: green">Returned</span>' : '<span style="color: orange">Active</span>';
        if (!b.return_date && new Date(b.due_date) < new Date()) {
          status = '<span style="color: red">Overdue</span>';
        }
        
        return `
          <tr>
            <td>${b.title} (Copy #${b.copy_id})</td>
            <td>${new Date(b.issue_date).toLocaleDateString()}</td>
            <td>${new Date(b.due_date).toLocaleDateString()}</td>
            <td>${b.return_date ? new Date(b.return_date).toLocaleDateString() : '-'}</td>
            <td>$${b.fine_amount.toFixed(2)} (${b.paid_status || 'N/A'})</td>
            <td>${status}</td>
          </tr>
        `;
      }).join('');
    }
    loadMyBooks();
  </script>
</body>
</html>
