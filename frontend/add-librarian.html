<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Librarian - Library System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="sidebar"></nav>
  <main>
    <h2 class="header-title">Register New Admin/Librarian</h2>
    <div class="card">
      <form id="form" onsubmit="submitForm(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" required placeholder="John Librarian" pattern="^[-A-Za-z\\s]+$" title="Name should only contain letters, spaces, and hyphens" minlength="2" maxlength="150">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="john.admin@library.com" maxlength="150">
        </div>
        <button type="submit" class="btn">Register Librarian</button>
      </form>
      <div id="status" class="status"></div>
    </div>
  </main>
  <script src="script.js"></script>
  <script>
    async function submitForm(e) {
      e.preventDefault();
      
      const payload = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim()
      };

      try {
        const res = await fetch('/api/librarians', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
        });
        if (res.ok) {
          showStatus('status', 'Librarian registered successfully!', true);
          document.getElementById('form').reset();
        } else {
          showStatus('status', 'Error registering librarian. Maybe email already exists?', false);
        }
      } catch (err) {
        showStatus('status', 'Network Error', false);
      }
    }
  </script>
</body>
</html>
