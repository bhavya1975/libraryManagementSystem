<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Library System</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container { max-width: 480px; margin: 80px auto; background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid var(--border-color); backdrop-filter: blur(10px); }
    .role-btn { display: block; width: 100%; margin-bottom: 15px; text-align: center; }
  </style>
</head>
<body>
  <div class="login-container">
    <div style="text-align: center; margin-bottom: 2rem;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" style="width:80px;height:80px;margin-bottom:10px;filter:drop-shadow(0 0 15px var(--primary));">
        <defs>
          <linearGradient id="logograd" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:var(--primary);stop-opacity:1" />
            <stop offset="100%" style="stop-color:var(--primary-hover);stop-opacity:1" />
          </linearGradient>
        </defs>
        <path fill="url(#logograd)" d="M50 8C27 8 8 20 8 40v42c0 3 4 5 7 4 10-3 23-5 35-5s25 2 35 5c3 1 7-1 7-4V40C92 20 73 8 50 8zm-2 74c-12 0-24 2-32 4V42c6-3 17-6 32-6v46zm36 4c-8-2-20-4-32-4V36c15 0 26 3 32 6v44z"/>
        <path fill="var(--success)" d="M45 15h10v10H45z" />
      </svg>
      <h2 style="font-size: 2rem; font-weight: 700; margin-bottom: 10px; color: var(--text-main);">Welcome to Library DBMS</h2>
      <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; padding: 0 1rem;">
        Authenticate below to access the robust digital catalog, manage active transactions, and check your personalized reading data.
      </p>
    </div>
    
    <div id="role-selection">
      <button class="btn role-btn" onclick="selectRole('admin')">Login as Admin (Librarian)</button>
      <button class="btn role-btn" onclick="selectRole('user')">Login as User (Member)</button>
    </div>

    <div id="admin-login" style="display: none;">
      <h3>Select Librarian</h3>
      <select id="librarian-select" class="form-group" style="width: 100%; margin: 15px 0; padding: 10px;"></select>
      <button class="btn role-btn" onclick="login('admin')">Access Dashboard</button>
      <button class="btn role-btn" style="background: transparent; color: var(--text-muted);" onclick="goBack()">Back</button>
    </div>

    <div id="user-login" style="display: none;">
      <h3>Select Member</h3>
      <select id="member-select" class="form-group" style="width: 100%; margin: 15px 0; padding: 10px;"></select>
      <button class="btn role-btn" onclick="login('user')">Access Dashboard</button>
      <button class="btn role-btn" style="background: transparent; color: var(--text-muted);" onclick="goBack()">Back</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    async function loadData() {
      const [lRes, mRes] = await Promise.all([fetch('/api/librarians'), fetch('/api/members')]);
      const libs = await lRes.json();
      const mems = await mRes.json();
      document.getElementById('librarian-select').innerHTML = libs.map(l => `<option value="${l.librarian_id}">${l.name}</option>`).join('');
      document.getElementById('member-select').innerHTML = mems.map(m => `<option value="${m.member_id}">${m.name}</option>`).join('');
    }
    loadData();

    function selectRole(role) {
      document.getElementById('role-selection').style.display = 'none';
      if (role === 'admin') document.getElementById('admin-login').style.display = 'block';
      if (role === 'user') document.getElementById('user-login').style.display = 'block';
    }

    function goBack() {
      document.getElementById('admin-login').style.display = 'none';
      document.getElementById('user-login').style.display = 'none';
      document.getElementById('role-selection').style.display = 'block';
    }

    function login(role) {
      if (role === 'admin') {
        const pass = prompt('Enter Admin Password (Hint: admin123):');
        if (pass !== 'admin123') {
          alert('Invalid password! Access denied.');
          return;
        }
        localStorage.setItem('userId', document.getElementById('librarian-select').value);
      } else {
        localStorage.setItem('userId', document.getElementById('member-select').value);
      }
      localStorage.setItem('role', role);
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
