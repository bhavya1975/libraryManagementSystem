<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Issue Book - Library System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<nav id="sidebar"></nav>

  <main>
    <h2 class="header-title">Issue Book Checkout</h2>
    <div class="card">
      <form id="form" onsubmit="submitForm(event)">
        <div class="form-group">
          <label>Member (Type to search)</label>
          <input type="text" id="member" list="member-list" required placeholder="Type member name" autocomplete="off">
          <datalist id="member-list"></datalist>
        </div>
        <div class="form-group">
          <label>Book Title (Type to search)</label>
          <input type="text" id="book" list="book-list" required placeholder="Type book title" autocomplete="off" oninput="handleBookSelect()">
          <datalist id="book-list"></datalist>
        </div>
        <div class="form-group">
          <label>Available Physical Copy</label>
          <select id="copy" required disabled><option value="">Select a book first...</option></select>
        </div>
        <div class="form-group">
          <label>Approving Librarian</label>
          <select id="librarian" required><option value="">Loading librarians...</option></select>
        </div>
        <button type="submit" class="btn">Issue Book</button>
      </form>
      <div id="status" class="status"></div>
    </div>
  </main>
  <script src="script.js"></script>
  <script>
    let allMembers = [];
    let allBooks = [];

    async function load() {
      const [mRes, bRes, lRes] = await Promise.all([
        fetch('/api/members'), fetch('/api/books'), fetch('/api/librarians')
      ]);
      const [mem, bks, lib] = await Promise.all([mRes.json(), bRes.json(), lRes.json()]);
      
      allMembers = mem;
      allBooks = bks;

      document.getElementById('member-list').innerHTML = allMembers.map(m => `<option value="${m.name.trim()}"></option>`).join('');
      document.getElementById('book-list').innerHTML = allBooks.map(b => `<option value="${b.title.trim()}"></option>`).join('');
      document.getElementById('librarian').innerHTML = '<option value="">Select Librarian</option>' + lib.map(l => `<option value="${l.librarian_id}">${l.name.trim()}</option>`).join('');
    }
    load();

    async function handleBookSelect() {
      const titleStr = document.getElementById('book').value.trim();
      const bookObj = allBooks.find(b => b.title.trim().toLowerCase() === titleStr.toLowerCase());
      
      const copyEl = document.getElementById('copy');
      if (!bookObj) {
        copyEl.innerHTML = '<option value="">Select a valid book first...</option>';
        copyEl.disabled = true;
        return;
      }
      
      copyEl.innerHTML = '<option value="">Loading copies...</option>';
      const res = await fetch(`/api/books/available?book_id=${bookObj.book_id}`);
      const copies = await res.json();
      if (copies.length === 0) {
        copyEl.innerHTML = '<option value="">No copies available right now.</option>';
        copyEl.disabled = true;
      } else {
        copyEl.innerHTML = copies.map((c, index) => `<option value="${c.copy_id}">Copy #${index + 1}</option>`).join('');
        copyEl.disabled = false;
      }
    }

    async function submitForm(e) {
      e.preventDefault();
      
      const memberName = document.getElementById('member').value.trim();
      const memberObj = allMembers.find(m => m.name.trim().toLowerCase() === memberName.toLowerCase());
      
      if (!memberObj) {
        showStatus('status', 'Invalid member. Please select from the suggestions.', false);
        return;
      }

      const payload = {
        member_id: memberObj.member_id,
        copy_id: Number(document.getElementById('copy').value),
        librarian_id: Number(document.getElementById('librarian').value)
      };

      try {
        const res = await fetch('/api/issue', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
        });
        if (res.ok) {
          showStatus('status', 'Book successfully issued!', true);
          document.getElementById('form').reset();
          handleBookSelect(); // reset copy dropdown safely
        } else {
          showStatus('status', 'Error issuing book', false);
        }
      } catch (err) {
        showStatus('status', 'Network Error', false);
      }
    }
  </script>
</body>
</html>
