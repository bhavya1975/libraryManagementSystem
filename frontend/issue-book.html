<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Issue Book - Library System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<nav>
  <h1>Library DBMS</h1>
  <a href="index.html" class="">Dashboard</a>
  <a href="add-book.html" class="">Add Book</a>
  <a href="register-member.html" class="">Register Member</a>
  <a href="issue-book.html" class="active">Issue Book</a>
  <a href="return-book.html" class="">Return Book</a>
  <a href="search-book.html" class="">Search Book</a>
  <a href="overdue.html" class="">View Overdue</a>
</nav>

  <main>
    <h2 class="header-title">Issue Book Checkout</h2>
    <div class="card">
      <form id="form" onsubmit="submitForm(event)">
        <div class="form-group">
          <label>Member</label>
          <select id="member" required><option value="">Loading members...</option></select>
        </div>
        <div class="form-group">
          <label>Book Title</label>
          <select id="book" required onchange="loadCopies()"><option value="">Loading books...</option></select>
        </div>
        <div class="form-group">
          <label>Available Physical Copy</label>
          <select id="copy" required disabled><option value="">Select a book first...</option></select>
        </div>
        <div class="form-group">
          <label>Approving Librarian</label>
          <select id="librarian" required><option value="">Loading librarians...</option></select>
        </div>
        <button type="submit" class="btn">Issue Book (Trigger Active)</button>
      </form>
      <div id="status" class="status"></div>
    </div>
  </main>
  <script src="script.js"></script>
  <script>
    async function load() {
      const [mRes, bRes, lRes] = await Promise.all([
        fetch('/api/members'), fetch('/api/books'), fetch('/api/librarians')
      ]);
      const [mem, bks, lib] = await Promise.all([mRes.json(), bRes.json(), lRes.json()]);
      
      document.getElementById('member').innerHTML = '<option value="">Select Member</option>' + mem.map(m => `<option value="${m.member_id}">${m.name}</option>`).join('');
      document.getElementById('book').innerHTML = '<option value="">Select Book</option>' + bks.map(b => `<option value="${b.book_id}">${b.title} (${b.isbn})</option>`).join('');
      document.getElementById('librarian').innerHTML = '<option value="">Select Librarian</option>' + lib.map(l => `<option value="${l.librarian_id}">${l.name}</option>`).join('');
    }
    load();

    async function loadCopies() {
      const book_id = document.getElementById('book').value;
      const copyEl = document.getElementById('copy');
      if (!book_id) {
        copyEl.innerHTML = '<option value="">Select a book first...</option>';
        copyEl.disabled = true;
        return;
      }
      const res = await fetch(`/api/books/available?book_id=${book_id}`);
      const copies = await res.json();
      if (copies.length === 0) {
        copyEl.innerHTML = '<option value="">No copies available right now.</option>';
        copyEl.disabled = true;
      } else {
        copyEl.innerHTML = copies.map(c => `<option value="${c.copy_id}">Copy #${c.copy_id}</option>`).join('');
        copyEl.disabled = false;
      }
    }

    async function submitForm(e) {
      e.preventDefault();
      const payload = {
        member_id: Number(document.getElementById('member').value),
        copy_id: Number(document.getElementById('copy').value),
        librarian_id: Number(document.getElementById('librarian').value)
      };
      try {
        const res = await fetch('/api/issue', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
        });
        if (res.ok) {
          showStatus('status', 'Book successfully issued!', true);
          document.getElementById('form').reset();
          loadCopies(); // reset copies
        } else {
          showStatus('status', 'Error issuing book', false);
        }
      } catch (err) {
        showStatus('status', 'Network Error', false);
      }
    }
  </script>
</body>
</html>
